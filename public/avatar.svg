<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8ff7"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="hood" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="80%" stop-color="#141c2b"/>
    </linearGradient>
    <linearGradient id="body" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#151d2d"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="198" fill="#111827"/>
  <circle cx="200" cy="200" r="196" fill="url(#bg)"/>

  <g clip-path="url(#circle-clip)">
    <!-- Shoulders / Body -->
    <path d="M80 340 Q80 280 200 262 Q320 280 320 340 L320 420 L80 420 Z" fill="url(#body)"/>

    <!-- Shoulder seams -->
    <path d="M200 262 Q145 275 115 310" stroke="rgba(79,143,247,0.06)" stroke-width="1" fill="none"/>
    <path d="M200 262 Q255 275 285 310" stroke="rgba(79,143,247,0.06)" stroke-width="1" fill="none"/>

    <!-- Center zipper line -->
    <line x1="200" y1="268" x2="200" y2="400" stroke="rgba(79,143,247,0.08)" stroke-width="1.5"/>

    <!-- Circuit traces on shoulders -->
    <g opacity="0.12" stroke="#4f8ff7" stroke-width="1" fill="none">
      <!-- Left shoulder -->
      <line x1="110" y1="310" x2="145" y2="310"/>
      <line x1="145" y1="310" x2="145" y2="325"/>
      <circle cx="145" cy="310" r="2.5" fill="#4f8ff7"/>
      <circle cx="110" cy="310" r="1.5" fill="#4f8ff7"/>
      <line x1="120" y1="325" x2="140" y2="325"/>
      <circle cx="120" cy="325" r="1.5" fill="#4f8ff7"/>

      <!-- Right shoulder -->
      <line x1="290" y1="310" x2="255" y2="310"/>
      <line x1="255" y1="310" x2="255" y2="325"/>
      <circle cx="255" cy="310" r="2.5" fill="#4f8ff7"/>
      <circle cx="290" cy="310" r="1.5" fill="#4f8ff7"/>
      <line x1="280" y1="325" x2="260" y2="325"/>
      <circle cx="280" cy="325" r="1.5" fill="#4f8ff7"/>
    </g>

    <!-- Hood outer -->
    <path d="M108 290 Q108 155 200 115 Q292 155 292 290" fill="url(#hood)"/>

    <!-- Hood fold lines -->
    <path d="M125 275 Q130 180 200 140" stroke="rgba(255,255,255,0.03)" stroke-width="1.5" fill="none"/>
    <path d="M275 275 Q270 180 200 140" stroke="rgba(255,255,255,0.03)" stroke-width="1.5" fill="none"/>

    <!-- Face shadow area -->
    <ellipse cx="200" cy="225" rx="52" ry="55" fill="#0c1220"/>

    <!-- Hood inner edge highlight -->
    <path d="M118 282 Q118 162 200 125 Q282 162 282 282" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>

    <!-- Terminal prompt in face area -->
    <g filter="url(#glow)" opacity="0.7">
      <text x="180" y="222" font-family="monospace" font-size="18" fill="#4f8ff7" font-weight="bold">&gt;_</text>
    </g>

    <!-- Subtle collar accent -->
    <path d="M155 268 Q200 280 245 268" fill="none" stroke="rgba(79,143,247,0.15)" stroke-width="1"/>
  </g>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.12"/>
</svg>
